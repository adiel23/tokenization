server {
    listen 8000;
    server_name localhost;

    # Wallet Service
    location /v1/wallet/ {
        rewrite ^/v1/wallet/(.*) /$1 break;
        proxy_pass http://wallet:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Tokenization Service
    location /v1/tokenization/ {
        rewrite ^/v1/tokenization/(.*) /$1 break;
        proxy_pass http://tokenization:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Marketplace Service
    location /v1/marketplace/ {
        rewrite ^/v1/marketplace/(.*) /$1 break;
        proxy_pass http://marketplace:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Education Service
    location /v1/education/ {
        rewrite ^/v1/education/(.*) /$1 break;
        proxy_pass http://education:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Nostr Service
    location /v1/nostr/ {
        rewrite ^/v1/nostr/(.*) /$1 break;
        proxy_pass http://nostr:8005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Admin Service
    location /v1/admin/ {
        rewrite ^/v1/admin/(.*) /$1 break;
        proxy_pass http://admin:8006;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check for the Gateway itself
    location /health {
        return 200 '{"status":"ok","service":"gateway"}';
        add_header Content-Type application/json;
    }
}
