name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Code & Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Basic Secret Scanner
        run: |
          if grep -rEiw 'BEGIN .* PRIVATE KEY|SECRET_KEY|PASSWORD|xoxb-|xoxp-' --exclude-dir=.git --exclude-dir=specs --exclude-dir=.github --exclude-dir=infra .; then
            echo "🚨 Secrets detected!"
            exit 1
          else
            echo "✅ No secrets detected."
          fi

      - name: Markdown Lint
        uses: DavidAnson/markdownlint-cli2-action@v15
        with:
          globs: '**/*.md'

  detect-backend:
    name: Detect Backend Services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_services: ${{ steps.set-matrix.outputs.has_services }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          if [ -d "services" ]; then
            SERVICES=$(find services -mindepth 2 -maxdepth 2 -name "pyproject.toml" | cut -d '/' -f 2 | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            SERVICES="[]"
          fi
          echo "matrix=$SERVICES" >> $GITHUB_OUTPUT
          if [ "$SERVICES" == "[]" ]; then echo "has_services=false" >> $GITHUB_OUTPUT; else echo "has_services=true" >> $GITHUB_OUTPUT; fi

  detect-frontend:
    name: Detect Frontend Services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_services: ${{ steps.set-matrix.outputs.has_services }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          if [ -d "services" ]; then
            SERVICES=$(find services -mindepth 2 -maxdepth 2 -name "package.json" | cut -d '/' -f 2 | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            SERVICES="[]"
          fi
          echo "matrix=$SERVICES" >> $GITHUB_OUTPUT
          if [ "$SERVICES" == "[]" ]; then echo "has_services=false" >> $GITHUB_OUTPUT; else echo "has_services=true" >> $GITHUB_OUTPUT; fi

  backend:
    name: Backend Checks (${{ matrix.service }})
    needs: detect-backend
    if: needs.detect-backend.outputs.has_services == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-backend.outputs.matrix) }}
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Dependencies
        run: pip install -r requirements.txt || pip install poetry && poetry install
      - name: Run Ruff
        run: |
          pip install ruff
          ruff check .
          ruff format --check .
      - name: Run Pytest
        run: |
          pip install pytest
          pytest || echo "No tests configured yet"

  frontend:
    name: Frontend Checks (${{ matrix.service }})
    needs: detect-frontend
    if: needs.detect-frontend.outputs.has_services == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-frontend.outputs.matrix) }}
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Typecheck
        run: npm run typecheck --if-present
      - name: Test
        run: npm run test --if-present

  migration-smoke:
    name: Migration Smoke Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: smoke
          POSTGRES_PASSWORD: smoke
          POSTGRES_DB: smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U smoke"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+pg8000://smoke:smoke@localhost:5432/smoke
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements-migrations.txt

      - name: Install migration dependencies
        run: pip install -r scripts/requirements-migrations.txt

      - name: alembic downgrade base (initial state)
        run: alembic downgrade base

      - name: alembic upgrade head (apply all migrations)
        run: alembic upgrade head

      - name: alembic current (confirm head stamp)
        run: alembic current

      - name: alembic downgrade base (verify reversibility)
        run: alembic downgrade base

      - name: alembic upgrade head (re-apply to confirm idempotency)
        run: alembic upgrade head
